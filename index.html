<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 釜山慶州・哆啦A夢秋之旅</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --maple-red: #8B2500;
            --dora-blue: #00A0E9;
            --ginkgo-gold: #DAA520;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --diplomat-beige: #FDF5E6;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--diplomat-beige);
            margin: 0; padding-bottom: 90px; overflow-x: hidden;
        }

        /* 全螢幕 Hero 背景 */
        .hero {
            position: relative;
            height: 100vh;
            background: url('13972.png') center/cover no-repeat; /* 請確保哆啦A夢圖片在同目錄 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
        }

        .hero-header {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .hero-header h1 { margin: 0; font-size: 1.4rem; color: var(--maple-red); letter-spacing: 1px; }
        .hero-header p { margin: 5px 0 0; font-size: 0.9rem; color: var(--dora-blue); font-weight: bold; }

        /* 內容容器 */
        .container { display: none; padding: 20px; animation: slideUp 0.4s ease-out; }
        .container.active { display: block; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 高級卡片設計 */
        .card {
            background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .card-title { color: var(--maple-red); font-weight: 700; border-bottom: 2px solid var(--diplomat-beige); padding-bottom: 10px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }

        /* 底部導航 */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(15px);
            display: flex; justify-content: space-around;
            padding: 12px 0 25px; border-top: 1px solid #eee; z-index: 2000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #bbb; font-size: 0.7rem; cursor: pointer; }
        .nav-item.active { color: var(--dora-blue); }
        .nav-item i { font-size: 1.3rem; }

        /* 按鈕與清單樣式 */
        .btn-action { background: var(--dora-blue); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-upload { background: var(--maple-red); color: white; padding: 10px; border-radius: 10px; text-align: center; display: block; margin-top: 10px; cursor: pointer; font-size: 0.9rem; }
        .photo-gallery img { width: 100%; border-radius: 10px; margin-top: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .check-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .check-box { width: 20px; height: 20px; border: 2px solid #ddd; border-radius: 6px; margin-right: 12px; display: flex; align-items: center; justify-content: center; color: transparent; }
        .check-item.checked .check-box { background: var(--dora-blue); border-color: var(--dora-blue); color: white; }
        .check-item.checked span { text-decoration: line-through; color: #ccc; }
    </style>
</head>
<body>

<div id="home" class="container active" style="padding:0;">
    <div class="hero">
        <div class="hero-header">
            <h1>2026 BUSAN & GYEONGJU</h1>
            <p><i class="fa-solid fa-camera"></i> 哆啦A夢秋季特別篇</p>
        </div>
        <div style="margin-bottom: 100px;"></div>
    </div>
</div>

<div id="itinerary" class="container">
    <div class="card">
        <h3 class="card-title"><i class="fa-solid fa-leaf"></i> 實時旅程紀錄</h3>
        <p style="font-size: 0.85rem; color: #666;">在這裡上傳拍立得翻拍或當下美照，即時同步給旅伴！</p>
        
        <label for="imgUpload" class="btn-upload"><i class="fa-solid fa-cloud-arrow-up"></i> 點我上傳今日美照</label>
        <input type="file" id="imgUpload" style="display:none;" accept="image/*" onchange="uploadToImgBB(this.files[0])">
        <div id="uploadStatus" style="font-size: 0.8rem; color: var(--maple-red); margin-top: 5px; text-align: center;"></div>
        
        <div id="photoWall" class="photo-gallery"></div>
    </div>

    <div class="card">
        <h3 class="card-title"><i class="fa-solid fa-calendar-day"></i> DAY 1 抵達古都</h3>
        <p>16:30 抵達金海機場 ➔ 慶州 Rivertain</p>
        <p>20:00 東宮與月池 (夜楓倒影)</p>
    </div>
    <div class="card">
        <h3 class="card-title"><i class="fa-solid fa-calendar-day"></i> DAY 2 金黃銀杏</h3>
        <p>10:30 大陵苑石牆路 (銀杏地毯)</p>
        <p>17:30 廣安里 H Avenue 登記入住</p>
    </div>
</div>

<div id="split" class="container">
    <div class="card">
        <h3 class="card-title"><i class="fa-solid fa-wallet"></i> 公積金結算</h3>
        <input type="text" id="billName" placeholder="花費項目" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #eee; border-radius:10px;">
        <div style="display:flex; gap:10px;">
            <input type="number" id="billAmt" placeholder="金額 (KRW)" style="flex:1; padding:12px; border:1px solid #eee; border-radius:10px;">
            <select id="payer" style="width:80px; padding:12px; border:1px solid #eee; border-radius:10px;">
                <option value="我">我付</option>
                <option value="旅伴">旅伴</option>
            </select>
        </div>
        <button class="btn-action" onclick="addBill()">紀錄支出</button>
        <div id="billList" style="margin-top:20px; font-size:0.9rem;"></div>
        <div id="settlement" style="margin-top:15px; padding-top:15px; border-top:2px solid #eee; font-weight:700; color:var(--maple-red);"></div>
    </div>
</div>

<div id="lists" class="container">
    <div class="card">
        <h3 class="card-title"><i class="fa-solid fa-suitcase-rolling"></i> 行李清單</h3>
        <div id="pList"></div>
    </div>
    <div class="card">
        <h3 class="card-title"><i class="fa-solid fa-bag-shopping"></i> 購物清單</h3>
        <div id="sList"></div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="showTab('home', this)"><i class="fa-solid fa-house"></i>首頁</div>
    <div class="nav-item" onclick="showTab('itinerary', this)"><i class="fa-solid fa-camera-retro"></i>相冊</div>
    <div class="nav-item" onclick="showTab('split', this)"><i class="fa-solid fa-calculator"></i>分帳</div>
    <div class="nav-item" onclick="showTab('lists', this)"><i class="fa-solid fa-list-check"></i>清單</div>
</div>

<script>
    // --------------------------------------------------------
    // 🔧 系統配置區 (請將金鑰填入這裡)
    // --------------------------------------------------------
    
    // 1. 填入你剛剛申請到的 ImgBB API Key
    const IMGBB_API_KEY = "ba1b2b24f8275c9d3a199bea5cd52bf9"; 
    
    // 2. 填入你的 Firebase 設定 (完美淨化版)
    const firebaseConfig = {
        apiKey: "AIzaSyC884_zH7XM7l7C_ijhuFmEoKxbsN0O1Vw",
        authDomain: "busan-trip-2026-4148f.firebaseapp.com",
        databaseURL: "https://busan-trip-2026-4148f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "busan-trip-2026-4148f",
        storageBucket: "busan-trip-2026-4148f.firebasestorage.app",
        messagingSenderId: "819505968980",
        appId: "1:819505968980:web:03e6d05ef5101719327ac1",
        measurementId: "G-7274FP6LKD"
    };
        authDomain: "busan-trip-2026.firebaseapp.com",
        databaseURL: "https://busan-trip-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "busan-trip-2026"
    };

    // 初始化 Firebase Database
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --------------------------------------------------------
    // 📸 ImgBB 圖片上傳與 Firebase 同步邏輯
    // --------------------------------------------------------
    async function uploadToImgBB(file) {
        if (!file) return;
        const status = document.getElementById('uploadStatus');
        status.innerText = "⏳ 魔法傳輸中，請稍候...";

        // ImgBB 要求使用 FormData 格式上傳
        const formData = new FormData();
        formData.append("image", file);

        try {
            // 1. 上傳給 ImgBB
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            });
            const data = await response.json();

            if (data.success) {
                const imgUrl = data.data.url; // 取得 ImgBB 回傳的圖片網址
                
                // 2. 將輕量的網址存入 Firebase，實現秒同步！
                db.ref("busan_photos").push({
                    url: imgUrl,
                    timestamp: Date.now()
                });
                
                status.innerText = "✅ 上傳成功！旅伴已經能看到了。";
                setTimeout(() => status.innerText = "", 3000);
            } else {
                status.innerText = "❌ 上傳失敗，請檢查 ImgBB API Key。";
            }
        } catch (error) {
            status.innerText = "❌ 發生錯誤：" + error.message;
        }
    }

    // 監聽 Firebase 圖片數據，即時渲染照片牆
    db.ref("busan_photos").on("value", (snapshot) => {
        const wall = document.getElementById("photoWall");
        wall.innerHTML = ""; // 每次更新先清空
        snapshot.forEach((child) => {
            const photo = child.val();
            // 新照片會疊加在最上面
            wall.innerHTML = `<img src="${photo.url}" alt="旅程回憶">` + wall.innerHTML; 
        });
    });

    // --------------------------------------------------------
    // 💸 分帳與清單邏輯 (LocalStorage 輕量處理)
    // --------------------------------------------------------
    function showTab(id, el) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        window.scrollTo(0,0);
    }

    let bills = JSON.parse(localStorage.getItem('busan_v6_bills')) || [];
    function addBill() {
        const item = document.getElementById('billName').value;
        const amt = parseFloat(document.getElementById('billAmt').value);
        const payer = document.getElementById('payer').value;
        if(!item || !amt) return;
        bills.push({item, amt, payer});
        localStorage.setItem('busan_v6_bills', JSON.stringify(bills));
        renderBills();
    }

    function renderBills() {
        const list = document.getElementById('billList');
        const res = document.getElementById('settlement');
        let total = 0, me = 0;
        list.innerHTML = bills.map(b => {
            total += b.amt;
            if(b.payer === '我') me += b.amt;
            return `<div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span>${b.item} (${b.payer})</span><span>${b.amt.toLocaleString()} ₩</span></div>`;
        }).join('');
        const diff = me - (total/2);
        res.innerHTML = `總花費: ${total.toLocaleString()} ₩<br>${diff >= 0 ? '旅伴應付我' : '我應付旅伴'}: <span style="font-size:1.2rem;">${Math.abs(Math.round(diff)).toLocaleString()} ₩</span>`;
    }

    const packing = ["護照", "米色大衣", "Sky Navigator 箱", "韓幣", "NAMANE卡"];
    const shopping = ["Olive Young 精華", "UNOVE 護髮", "限定口味海苔"];

    function renderChecklist(id, data, key) {
        let saved = JSON.parse(localStorage.getItem(key)) || {};
        document.getElementById(id).innerHTML = data.map(item => `
            <div class="check-item ${saved[item] ? 'checked' : ''}" onclick="toggleCheck('${id}', '${key}', '${item}', this)">
                <div class="check-box"><i class="fa-solid fa-check"></i></div>
                <span>${item}</span>
            </div>
        `).join('');
    }

    function toggleCheck(id, key, item, el) {
        let saved = JSON.parse(localStorage.getItem(key)) || {};
        saved[item] = !saved[item];
        localStorage.setItem(key, JSON.stringify(saved));
        el.classList.toggle('checked');
    }

    window.onload = () => {
        renderBills();
        renderChecklist('pList', packing, 'busan_v6_pack');
        renderChecklist('sList', shopping, 'busan_v6_shop');
    };
</script>

</body>
</html>
