<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#FFF9F2">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png" type="image/png">
    <link id="manifest-link" rel="manifest" href="">
    <title>釜山慶州秋之旅 V42</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #C0392B; --accent: #F39C12; --dora: #2980B9; --card-bg: rgba(255, 255, 255, 0.88); --text-dark: #2C3E50; --shadow: 0 12px 40px rgba(0, 0, 0, 0.08); --glow: rgba(41, 128, 185, 0.3); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Nunito', 'Noto Sans TC', sans-serif; }
        body { background-color: #FFF9F2; background-image: radial-gradient(at 0% 0%, hsla(28,100%,74%,0.4) 0px, transparent 50%), radial-gradient(at 100% 0%, hsla(189,100%,76%,0.4) 0px, transparent 50%), radial-gradient(at 100% 100%, hsla(355,100%,83%,0.4) 0px, transparent 50%), radial-gradient(at 0% 100%, hsla(340,100%,76%,0.4) 0px, transparent 50%); background-attachment: fixed; color: var(--text-dark); margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        /* 動態氣候面板樣式 */
        .weather-info { background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.5)); border-radius: 18px; padding: 15px; border-left: 5px solid var(--accent); margin-top:12px; }

        /* V42 核心導航 UI */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(25px); display: flex; justify-content: space-around; align-items: center; padding: 10px 0 25px; border-top: 1px solid rgba(255,255,255,0.5); z-index: 2000; box-shadow: 0 -10px 40px rgba(0,0,0,0.06); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; color: #a5b1c2; font-size: 0.75rem; width: 18%; font-weight: 900; transition: 0.3s; }
        .nav-item.active { color: var(--dora); transform: translateY(-4px); }
        .nav-center { position: relative; top: -28px; background: var(--dora); color: white !important; width: 72px; height: 72px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 12px 30px rgba(41, 128, 185, 0.4); border: 6px solid #FFF9F2; }

        /* 卡片設計 */
        .card { background: var(--card-bg); backdrop-filter: blur(16px); border-radius: 32px; padding: 25px; margin-bottom: 22px; box-shadow: var(--shadow); }
        .folder-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .folder-card { background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(245,245,245,0.9)); border-radius: 24px; padding: 25px 15px; text-align: center; cursor: pointer; }

        /* 字卡與計算機 */
        .voice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .voice-card { background: white; padding: 15px; border-radius: 18px; text-align: center; border: 1px solid #eee; position: relative; }
        .calc-card { background: #fff; border-radius: 20px; padding: 20px; border: 1px solid #eee; margin-bottom: 20px; }
        .krw-input { font-size: 1.8rem; font-weight: 900; color: var(--dora); width: 100%; text-align: center; border: none; border-bottom: 3px solid #eee; background: transparent; }

        /* 預算光條 */
        .progress-bg { width: 100%; height: 16px; background: #ecf0f1; border-radius: 10px; overflow: hidden; margin: 15px 0 8px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #27AE60, #F1C40F, #E74C3C); width: 0%; transition: width 0.8s; }

        #pinModal, #flashcardModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(15px); }
        .modal-box { background: #fff; padding: 35px; border-radius: 28px; width: 85%; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        /* 隱藏元素 */
        .hidden { display: none; }
    </style>
</head>
<body>

<!-- 啟動畫面 -->
<div id="splash">
    <div class="splash-card">
        <h1>2026 BUSAN</h1>
        <h2 style="margin:8px 0; color:var(--text-dark); font-weight:900;">秋季雙城・皇家旅程</h2>
        <p style="color:var(--dora); font-weight:700;">V42 外交典藏定錨版</p>
    </div>
    <button class="btn-enter" onclick="enterApp()">進入專屬系統 <i class="fa-solid fa-plane-departure"></i></button>
</div>

<!-- 系統主體 -->
<div id="mainApp">
    
    <!-- Tab 1: 指南 (預設首頁) -->
    <div id="guide" class="container active">
        <div id="guideDashboard">
            <div class="card" style="border-left: 6px solid #E74C3C;">
                <h4 style="color: #E74C3C;"><i class="fa-solid fa-triangle-exclamation"></i> 行前通關 & 即時穿搭</h4>
                <div id="dynamicOutfit" class="weather-info">載入環境數據中...</div>
                <button class="btn-action" style="background: #27AE60; margin-top:15px;" onclick="openPapago()"><i class="fa-solid fa-camera"></i> 喚醒 Papago 翻譯</button>
            </div>
            
            <div class="folder-grid">
                <div class="folder-card" onclick="openGuideFolder('工具')"><i class="fa-solid fa-toolbox"></i><h3>工具庫</h3></div>
                <div class="folder-card" onclick="openGuideFolder('美食景點')"><i class="fa-solid fa-map-location-dot"></i><h3>職人美食</h3></div>
                <div class="folder-card" onclick="openGuideFolder('購物')"><i class="fa-solid fa-bag-shopping"></i><h3>生活美學</h3></div>
                <div class="folder-card" onclick="openGuideFolder('超商')"><i class="fa-solid fa-store"></i><h3>超比特輯</h3></div>
            </div>
        </div>
        
        <!-- 指南詳細內容 (含右滑返回) -->
        <div id="guideDetail" class="hidden">
            <div class="day-tabs" id="guideSubTabs"></div>
            <div id="guideList" style="margin-top:15px;"></div>
        </div>
    </div>

    <!-- Tab 2: 記帳 (含金融中心) -->
    <div id="split" class="container">
        <div class="fx-card">
            <div><div style="font-size:0.85rem; opacity:0.8;">🌐 即時匯率</div><div id="liveFxRate" style="font-size:1.4rem; font-weight:900;">1₩ = 0.0240$</div></div>
            <i class="fa-solid fa-coins" style="font-size:2rem;"></i>
        </div>
        
        <div class="calc-card">
            <h3>🛒 購物換算與退稅雷達</h3>
            <input type="number" id="quickKrw" class="krw-input" placeholder="₩ 輸入韓元..." oninput="calcQuickFx()">
            <div id="quickResult" style="text-align:center; font-weight:900; font-size:1.2rem; margin-top:10px;">輸入看台幣</div>
            <div id="taxResult" class="tax-badge" style="display:none; margin:10px auto;">可退稅</div>
            <button class="btn-action" style="background:#2C3E50; margin-top:10px;" onclick="transferToBill()">帶入下方記帳</button>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>👤 永久身分定錨</h3>
                <button onclick="openProfileModal()" style="border:none; background:none; color:var(--primary); font-weight:900;">⚙️ 修改</button>
            </div>
            <select id="deviceOwner" class="input-box" onchange="updateOwner()"></select>
            
            <div class="day-tabs" style="margin-top:15px;">
                <button class="day-tab active" id="tabShared" onclick="filterBillsWithPin('公費')">☁️ 公費</button>
                <button class="day-tab" id="tabPrivate" onclick="filterBillsWithPin('私帳')">🔒 私帳</button>
            </div>
            
            <div id="billInputs" style="margin-top:15px;">
                <input type="text" id="billName" class="input-box" placeholder="項目內容">
                <div class="flex-row">
                    <input type="number" id="billAmt" class="input-box flex-1" placeholder="金額">
                    <select id="billCurrency" class="input-box" style="width:85px;"><option value="KRW">₩</option><option value="TWD">$</option></select>
                </div>
                <div id="payerSelectArea" class="flex-row">
                    <select id="payer" class="input-box flex-1"></select>
                </div>
                <button class="btn-action" onclick="addBill()">紀錄這筆支出</button>
            </div>
            
            <div id="billList" style="margin-top:20px;"></div>
            <div id="settlement" style="background:#fff5f5; padding:20px; border-radius:20px; font-weight:900; margin-top:15px;"></div>
            
            <div class="budget-box card" style="margin-top:20px; border:none; box-shadow:none; padding:0;">
                <h4>📉 預算剩餘血量</h4>
                <div class="progress-bg"><div class="progress-fill" id="budgetFill"></div></div>
                <div id="budgetStatus" style="text-align:right; font-size:0.85rem; font-weight:900;"></div>
            </div>
        </div>
    </div>

    <!-- Tab 3: 手帳 (置中) -->
    <div id="itinerary" class="container">
        <div class="day-tabs">
            <button class="day-tab active" onclick="filterIti('11/13')">11/13</button>
            <button class="day-tab" onclick="filterIti('11/14')">11/14</button>
            <button class="day-tab" onclick="filterIti('11/15')">11/15</button>
            <button class="day-tab" onclick="filterIti('11/16')">11/16</button>
            <button class="day-tab" onclick="filterIti('11/17')">11/17</button>
        </div>
        <div id="itiContent" style="margin-top:15px;"></div>
        <div class="card" style="margin-top:15px;">
            <h3>🖋️ 規劃新行程</h3>
            <input type="time" id="itiTime" class="input-box">
            <input type="text" id="itiDesc" class="input-box" placeholder="景點名稱或備註">
            <button class="btn-action" onclick="saveItinerary()">同步至雲端手帳</button>
        </div>
    </div>

    <!-- Tab 4: 購物 -->
    <div id="shop" class="container">
        <div class="card">
            <h3>🛍️ 專屬購物清單</h3>
            <div id="shopTabsUI" class="day-tabs"></div>
            <input type="text" id="newShop" class="input-box" style="margin-top:15px;" placeholder="想買什麼？">
            <button class="btn-action" onclick="addShopItem()">存入願望清單</button>
            <div id="sList" style="margin-top:20px;"></div>
        </div>
    </div>

    <!-- Tab 5: 相冊 -->
    <div id="photo" class="container">
        <div class="card">
            <h3>📸 拍立得回憶牆</h3>
            <p style="font-size:0.85rem; color:#888;">支援多圖批次上傳，點擊照片放大可刪除。</p>
            <input type="file" id="photoImgUpload" multiple style="display:none;" onchange="uploadMultiple(this.files)">
            <button class="btn-action" onclick="document.getElementById('photoImgUpload').click()">批次上傳美照</button>
            <div id="albumContainer" style="margin-top:20px;"></div>
        </div>
    </div>

    <!-- 底部導航欄 -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="showTab('guide', this)"><i class="fa-solid fa-star"></i>指南</div>
        <div class="nav-item" onclick="showTab('split', this)"><i class="fa-solid fa-calculator"></i>記帳</div>
        <div class="nav-item nav-center active" onclick="showTab('itinerary', this)"><i class="fa-solid fa-book"></i></div>
        <div class="nav-item" onclick="showTab('shop', this)"><i class="fa-solid fa-cart-shopping"></i>購物</div>
        <div class="nav-item" onclick="showTab('photo', this)"><i class="fa-solid fa-images"></i>相冊</div>
    </div>
</div>

<!-- 各類浮動視窗 (Modal) -->
<div id="pinModal"><div class="modal-box"><h3>🔐 私密空間解鎖</h3><input type="password" id="pinInput" class="pin-input" maxlength="4"><div class="flex-row" style="margin-top:20px;"><button onclick="cancelPin()" class="btn-action" style="background:#eee; color:#666;">取消</button><button onclick="submitPin()" class="btn-action">解鎖</button></div></div></div>
<div id="flashcardModal" onclick="if(event.target.id === 'flashcardModal') closeFlashcard()"><div class="modal-box"><div id="fc-tw" style="color:#888; font-weight:900;"></div><div id="fc-kr" style="font-size:2rem; color:var(--primary); font-weight:900; margin:20px 0;"></div><button class="btn-action" onclick="speakKorean(document.getElementById('fc-kr').innerText)">🔊 語音播放</button></div></div>

<script>
    // ⭐️ 核心定錨資料庫與身分
    const firebaseConfig = { apiKey: "AIzaSyC884_zH7XM7l7C_ijhuFmEoKxbsN0O1Vw", authDomain: "busan-trip-2026-4148f.firebaseapp.com", databaseURL: "https://busan-trip-2026-4148f-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "busan-trip-2026-4148f", storageBucket: "busan-trip-2026-4148f.firebasestorage.app", messagingSenderId: "819505968980", appId: "1:819505968980:web:03e6d05ef5101719327ac1" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const ROOT = "busan_final_master_anchor"; 
    const refs = { iti: db.ref(`${ROOT}/iti`), guide: db.ref(`${ROOT}/guide`), shop: db.ref(`${ROOT}/shop`), photo: db.ref(`${ROOT}/photos`), bill: db.ref(`${ROOT}/bills`), profile: db.ref(`${ROOT}/profiles`) };

    let u1 = { name: '溫', avatar: '👩' }, u2 = { name: '鴨', avatar: '🦆' };
    let deviceOwner = localStorage.getItem('busan_permanent_anchor_owner') || 'user1';

    // ⭐️ 身分定錨邏輯
    refs.profile.on('value', s => {
        if(s.exists()) { let d = s.val(); u1 = d.user1 || u1; u2 = d.user2 || u2; }
        else { refs.profile.set({user1: u1, user2: u2}); }
        updateProfileUI(); renderBills();
    });

    function updateProfileUI() {
        const sel = document.getElementById('deviceOwner');
        sel.innerHTML = `<option value="user1" ${deviceOwner==='user1'?'selected':''}>${u1.avatar} ${u1.name}</option><option value="user2" ${deviceOwner==='user2'?'selected':''}>${u2.avatar} ${u2.name}</option>`;
        document.getElementById('payer').innerHTML = `<option value="user1">${u1.name} 代墊</option><option value="user2">${u2.name} 代墊</option>`;
    }

    function updateOwner() { deviceOwner = document.getElementById('deviceOwner').value; localStorage.setItem('busan_permanent_anchor_owner', deviceOwner); renderBills(); }

    // --- 🏦 金流與氣象 ---
    let liveRate = 0.024;
    async function fetchAll() {
        try {
            let fx = await fetch('https://api.exchangerate-api.com/v4/latest/KRW');
            let fxD = await fx.json(); liveRate = fxD.rates.TWD;
            document.getElementById('liveFxRate').innerText = `1₩ = ${liveRate.toFixed(4)} 台幣`;
            
            let w = await fetch('https://wttr.in/Busan?format=j1');
            let wD = await w.json();
            let temp = parseInt(wD.current_condition[0].temp_C);
            let sugg = temp <= 16 ? "🍁 強烈建議「洋蔥式防風穿搭」：發熱衣 + 防風大衣。" : "舒適長袖外套即可。";
            document.getElementById('dynamicOutfit').innerHTML = `<i class="fa-solid fa-temperature-three-quarters"></i> 即時 ${temp}℃：${sugg}`;
        } catch(e){}
        renderBills();
    }

    function calcQuickFx() {
        let k = parseInt(document.getElementById('quickKrw').value) || 0;
        if(k===0) return;
        document.getElementById('quickResult').innerHTML = `約 NT$ <span style="color:var(--primary); font-size:1.5rem;">${Math.round(k*liveRate).toLocaleString()}</span>`;
        let tax = document.getElementById('taxResult');
        if(k>=30000) { tax.style.display="block"; tax.innerText=`達標！可退稅約 ₩${Math.round(k*0.06)}`; } else tax.style.display="none";
    }

    // --- 🧮 記帳引擎 ---
    let privateBills = JSON.parse(localStorage.getItem('busan_anchor_private')) || [];
    let sharedBills = []; let curTab = '公費';

    refs.bill.on('value', s => { sharedBills = []; s.forEach(ch => sharedBills.push({...ch.val(), key:ch.key})); renderBills(); });

    function renderBills() {
        const l = document.getElementById('billList'), res = document.getElementById('settlement');
        let all = [...sharedBills, ...privateBills].sort((a,b)=>a.ts - b.ts);
        let s1=0, s2=0, pT=0; l.innerHTML='';
        
        all.filter(b => curTab==='公費' ? b.type==='公費' : b.owner===deviceOwner).forEach(b => {
            l.innerHTML += `<div class="card" style="padding:15px; margin-bottom:10px; display:flex; justify-content:space-between;"><div><b>${b.item}</b><br><small>${b.payer==='user1'?u1.name:u2.name} 付</small></div><div style="text-align:right; font-weight:900; color:var(--dora);">${b.amt}${b.cur==='TWD'?'$':'₩'}</div></div>`;
        });

        all.forEach(b => {
            let v = b.cur==='KRW' ? b.amt*liveRate : b.amt;
            if(b.type==='公費') { if(b.payer==='user1') s1+=v; else s2+=v; }
            else if(b.owner===deviceOwner) pT+=v;
        });
        
        let totalS = s1+s2; let bal = s1 - (totalS/2);
        res.innerHTML = `公費總計: $${Math.round(totalS)} <br> ` + (bal > 0 ? `👉 ${u2.name} 應給 ${u1.name} $${Math.round(bal)}` : `👉 ${u1.name}應給 ${u2.name} $${Math.round(-bal)}`);
        
        let spent = (totalS/2) + pT;
        document.getElementById('budgetFill').style.width = `${Math.min(100, (spent/30000)*100)}%`;
        document.getElementById('budgetStatus').innerText = `已花費 $${Math.round(spent)} / 預算 $30,000`;
    }

    function addBill() {
        let n=document.getElementById('billName').value, a=parseFloat(document.getElementById('billAmt').value);
        if(!n||!a) return;
        let nb = { item:n, amt:a, cur:document.getElementById('billCurrency').value, type:curTab, payer:document.getElementById('payer').value, owner:deviceOwner, ts:Date.now() };
        if(curTab==='公費') refs.bill.push(nb); else { privateBills.push(nb); localStorage.setItem('busan_anchor_private', JSON.stringify(privateBills)); renderBills(); }
        document.getElementById('billName').value=''; document.getElementById('billAmt').value='';
    }

    // --- 🧭 指南與手冊 ---
    function openPapago() { window.location.href="intent://translator#Intent;scheme=papago;package=com.naver.labs.translator;S.browser_fallback_url=https%3A%2F%2Fpapago.naver.com%2F;end;"; }
    function speakKorean(t) { let m = new SpeechSynthesisUtterance(t); m.lang='ko-KR'; window.speechSynthesis.speak(m); }

    // 初始化與導航
    function showTab(id, el) {
        document.querySelectorAll('.container').forEach(c=>c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
        if(id==='shop') checkPinAccess(()=>renderShop());
    }
    function enterApp() { document.getElementById('splash').style.display='none'; document.getElementById('mainApp').style.display='block'; setTimeout(()=>document.getElementById('mainApp').style.opacity=1, 50); fetchAll(); }

    window.onload = () => { updateProfileUI(); };
</script>
</body>
</html>
